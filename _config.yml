# Site settings
title: Regding | A personal Tech Blog
description: "一个个人的技术类博客"
url: "https://regding.github.io/"
author:
  name: "regding"
  email: "regding@gmail.com"
  url: "https://github.com/regding"

# Build settings
# Change this to your relative path (ex: /blog/), or leave just a /
baseurl: /blog/
markdown: kramdown
source: .
destination: ./_site
permalink: /:title
paginate: 8
paginate_path: /page:num/

# Default values
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Plugins
gems:
  - jekyll-paginate

# Custom variables
version: "1.1.0"

# Options
custom_header: false
custom_nav_footer: false
reverse: false
