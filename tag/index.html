---
layout: page
title: "Tag"
description: ""
---
{% for tag in site.tags %}
    <h3>{{ tag | first }}</h3>
        
    {% for posts in tag %}
        {% for post in posts %}
            {% if post.url %}
                <li>
                    <span>{{ post.date | date: "%B %e, %Y" }}</span> &raquo;
                    <a href="{% if site.baseurl == '/' %}{{ post.url }}{% else %}{{ post.url | prepend: site.baseurl }}{% endif %}">{{ post.title }}</a></li>
            {% endif %}
        {% endfor %}
    {% endfor %}
{% endfor %}
